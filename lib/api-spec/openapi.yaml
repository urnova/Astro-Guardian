openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ASTRAL-BOT Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot status
  - name: guilds
    description: Guild management
  - name: warns
    description: Warn system
  - name: giveaways
    description: Giveaway system
  - name: surveys
    description: Survey system
  - name: actions
    description: Bot actions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/guilds:
    get:
      operationId: getBotGuilds
      tags: [bot]
      summary: Get all guilds the bot is in
      responses:
        "200":
          description: List of guilds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuildSummary"

  /guilds/{guildId}/config:
    get:
      operationId: getGuildConfig
      tags: [guilds]
      summary: Get guild configuration
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Guild config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildConfig"
    put:
      operationId: updateGuildConfig
      tags: [guilds]
      summary: Update guild configuration
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuildConfigBody"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildConfig"

  /guilds/{guildId}/stats:
    get:
      operationId: getGuildStats
      tags: [guilds]
      summary: Get guild statistics
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Guild stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildStats"

  /guilds/{guildId}/channels:
    get:
      operationId: getGuildChannels
      tags: [guilds]
      summary: Get guild channels
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscordChannel"

  /guilds/{guildId}/members:
    get:
      operationId: getGuildMembers
      tags: [guilds]
      summary: Get guild members
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuildMember"

  /guilds/{guildId}/warns:
    get:
      operationId: getGuildWarns
      tags: [warns]
      summary: Get all warns for a guild
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of warns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warn"
    post:
      operationId: addWarn
      tags: [warns]
      summary: Add a warn to a member
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWarnBody"
      responses:
        "201":
          description: Created warn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warn"

  /guilds/{guildId}/warns/{warnId}:
    delete:
      operationId: deleteWarn
      tags: [warns]
      summary: Delete a specific warn
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
        - name: warnId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/banned-words:
    get:
      operationId: getBannedWords
      tags: [guilds]
      summary: Get banned words for a guild
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of banned words
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BannedWord"
    post:
      operationId: addBannedWord
      tags: [guilds]
      summary: Add a banned word
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddBannedWordBody"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BannedWord"

  /guilds/{guildId}/banned-words/{wordId}:
    delete:
      operationId: deleteBannedWord
      tags: [guilds]
      summary: Delete a banned word
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
        - name: wordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/giveaways:
    get:
      operationId: getGiveaways
      tags: [giveaways]
      summary: Get all giveaways for a guild
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of giveaways
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Giveaway"
    post:
      operationId: createGiveaway
      tags: [giveaways]
      summary: Create a giveaway
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGiveawayBody"
      responses:
        "201":
          description: Created giveaway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Giveaway"

  /guilds/{guildId}/giveaways/{giveawayId}/end:
    post:
      operationId: endGiveaway
      tags: [giveaways]
      summary: End a giveaway and pick winners
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
        - name: giveawayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Giveaway ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/surveys:
    get:
      operationId: getSurveys
      tags: [surveys]
      summary: Get all surveys for a guild
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of surveys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Survey"
    post:
      operationId: createSurvey
      tags: [surveys]
      summary: Create a survey
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSurveyBody"
      responses:
        "201":
          description: Created survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"

  /guilds/{guildId}/surveys/{surveyId}:
    get:
      operationId: getSurveyById
      tags: [surveys]
      summary: Get a survey with responses
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
        - name: surveyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survey with responses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyWithResponses"

  /guilds/{guildId}/actions/kick:
    post:
      operationId: kickMember
      tags: [actions]
      summary: Kick a member
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KickBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/ban:
    post:
      operationId: banMember
      tags: [actions]
      summary: Ban a member
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/unban:
    post:
      operationId: unbanMember
      tags: [actions]
      summary: Unban a user
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnbanBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/mute:
    post:
      operationId: muteMember
      tags: [actions]
      summary: Timeout (mute) a member
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MuteBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/unmute:
    post:
      operationId: unmuteMember
      tags: [actions]
      summary: Remove timeout from a member
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnmuteBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/clear:
    post:
      operationId: clearMessages
      tags: [actions]
      summary: Bulk delete messages in a channel
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClearBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/massban:
    post:
      operationId: massBanMembers
      tags: [actions]
      summary: Ban multiple users by ID
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MassbanBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/nuke:
    post:
      operationId: nukeChannel
      tags: [actions]
      summary: Delete and recreate a channel
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NukeBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/dm:
    post:
      operationId: sendDm
      tags: [actions]
      summary: Send a DM to a guild member
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/maintenance:
    post:
      operationId: triggerMaintenance
      tags: [actions]
      summary: Toggle maintenance mode
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/breach:
    post:
      operationId: triggerBreach
      tags: [actions]
      summary: Toggle breach/lockdown mode
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreachBody"
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/embed:
    post:
      operationId: sendEmbed
      tags: [actions]
      summary: Send an embed to a channel
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmbedBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/announce:
    post:
      operationId: sendAnnouncement
      tags: [actions]
      summary: Send an announcement
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnounceBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/actions/say:
    post:
      operationId: sendSay
      tags: [actions]
      summary: Send a plain message as the bot
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SayBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/roles:
    get:
      operationId: getGuildRoles
      tags: [guilds]
      summary: Get guild roles
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscordRole"

  /guilds/{guildId}/rules:
    get:
      operationId: getGuildRules
      tags: [guilds]
      summary: Get server rules configuration
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Server rules or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerRules"
                nullable: true
    put:
      operationId: updateGuildRules
      tags: [guilds]
      summary: Update server rules configuration
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServerRulesBody"
      responses:
        "200":
          description: Updated rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerRules"

  /guilds/{guildId}/rules/send:
    post:
      operationId: sendGuildRules
      tags: [guilds]
      summary: Send or update the rules message in a channel
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendRulesBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /guilds/{guildId}/logs:
    get:
      operationId: getGuildLogs
      tags: [guilds]
      summary: Get recent logs for a guild
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    BotStatus:
      type: object
      properties:
        online:
          type: boolean
        username:
          type: string
        discriminator:
          type: string
        avatar:
          type: string
          nullable: true
        guildCount:
          type: integer
        uptime:
          type: number
        ping:
          type: number
      required: [online, username, guildCount, uptime, ping]

    GuildSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
          nullable: true
        memberCount:
          type: integer
        maintenanceMode:
          type: boolean
        breachMode:
          type: boolean
      required: [id, name, memberCount, maintenanceMode, breachMode]

    GuildConfig:
      type: object
      properties:
        guildId:
          type: string
        logChannelId:
          type: string
          nullable: true
        surveyChannelId:
          type: string
          nullable: true
        maintenanceMode:
          type: boolean
        maintenanceReason:
          type: string
          nullable: true
        breachMode:
          type: boolean
        automodEnabled:
          type: boolean
        antiRaidEnabled:
          type: boolean
        antiSpamEnabled:
          type: boolean
        maxMentions:
          type: integer
        maxMessagesPerMinute:
          type: integer
        welcomeChannelId:
          type: string
          nullable: true
        welcomeMessage:
          type: string
          nullable: true
        goodbyeChannelId:
          type: string
          nullable: true
        goodbyeMessage:
          type: string
          nullable: true
      required: [guildId, maintenanceMode, breachMode, automodEnabled, antiRaidEnabled, antiSpamEnabled, maxMentions, maxMessagesPerMinute]

    UpdateGuildConfigBody:
      type: object
      properties:
        logChannelId:
          type: string
          nullable: true
        surveyChannelId:
          type: string
          nullable: true
        maintenanceMode:
          type: boolean
        maintenanceReason:
          type: string
          nullable: true
        breachMode:
          type: boolean
        automodEnabled:
          type: boolean
        antiRaidEnabled:
          type: boolean
        antiSpamEnabled:
          type: boolean
        maxMentions:
          type: integer
        maxMessagesPerMinute:
          type: integer
        welcomeChannelId:
          type: string
          nullable: true
        welcomeMessage:
          type: string
          nullable: true
        goodbyeChannelId:
          type: string
          nullable: true
        goodbyeMessage:
          type: string
          nullable: true

    GuildStats:
      type: object
      properties:
        memberCount:
          type: integer
        channelCount:
          type: integer
        roleCount:
          type: integer
        warnCount:
          type: integer
        giveawayCount:
          type: integer
        surveyCount:
          type: integer
        bannedWordCount:
          type: integer
        boostLevel:
          type: integer
        boostCount:
          type: integer
        logCount:
          type: integer
      required: [memberCount, channelCount, roleCount, warnCount, giveawayCount, surveyCount, bannedWordCount, boostLevel, boostCount, logCount]

    DiscordChannel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: integer
      required: [id, name, type]

    Warn:
      type: object
      properties:
        id:
          type: integer
        guildId:
          type: string
        userId:
          type: string
        username:
          type: string
        reason:
          type: string
        moderatorId:
          type: string
        moderatorName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, guildId, userId, username, reason, moderatorId, moderatorName, createdAt]

    BannedWord:
      type: object
      properties:
        id:
          type: integer
        guildId:
          type: string
        word:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, guildId, word, createdAt]

    AddBannedWordBody:
      type: object
      properties:
        word:
          type: string
      required: [word]

    Giveaway:
      type: object
      properties:
        id:
          type: integer
        guildId:
          type: string
        channelId:
          type: string
        messageId:
          type: string
          nullable: true
        prize:
          type: string
        winnersCount:
          type: integer
        endsAt:
          type: string
          format: date-time
        ended:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        participants:
          type: integer
      required: [id, guildId, channelId, prize, winnersCount, endsAt, ended, createdBy, createdAt, participants]

    CreateGiveawayBody:
      type: object
      properties:
        channelId:
          type: string
        prize:
          type: string
        winnersCount:
          type: integer
        durationMinutes:
          type: integer
        createdBy:
          type: string
      required: [channelId, prize, winnersCount, durationMinutes, createdBy]

    Survey:
