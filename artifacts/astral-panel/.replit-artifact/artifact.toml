kind = "web"
previewPath = "/"
title = "Astral Panel"
version = "1.0.0"
id = "artifacts/astral-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20458
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/astral-panel run dev"

[services.env]
PORT = "20458"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/astral-panel", "run", "build"]
publicDir = "artifacts/astral-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
